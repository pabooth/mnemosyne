name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mnemo-core/pyproject.toml
      - name: Install core
        working-directory: mnemo-core
        run: pip install -e ".[dev]"
      - name: Lint core
        working-directory: mnemo-core
        run: ruff check .
      - name: Test core
        working-directory: mnemo-core
        run: pytest -q
      - name: Build core distributions
        working-directory: mnemo-core
        run: |
          python -m pip install build
          python -m build
      - name: Smoke-test built core wheel
        working-directory: mnemo-core
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv /tmp/mnemo-core-wheel
          /tmp/mnemo-core-wheel/bin/python -m pip install dist/*.whl
          /tmp/mnemo-core-wheel/bin/mnemo-evaluate --version
          /tmp/mnemo-core-wheel/bin/python -c \
            "from importlib.metadata import version; from mnemo_core.api.app import app; assert app.version == version('mnemo-core')"

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mnemo-ui/package-lock.json
      - name: Install UI
        working-directory: mnemo-ui
        run: npm ci
      - name: Test UI
        working-directory: mnemo-ui
        run: npm test
      - name: Build UI
        working-directory: mnemo-ui
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [core, ui]
    steps:
      - uses: actions/checkout@v7
      - name: Build core image
        run: docker build -t mnemo-core:ci mnemo-core
      - name: Build UI image
        run: docker build -t mnemo-ui:ci mnemo-ui
      - name: Validate Compose
        run: docker compose config
