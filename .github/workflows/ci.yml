name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mnemo-core/pyproject.toml
      - name: Install core
        working-directory: mnemo-core
        run: pip install -e ".[dev]"
      - name: Test core
        working-directory: mnemo-core
        run: pytest -q

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mnemo-ui/package-lock.json
      - name: Install UI
        working-directory: mnemo-ui
        run: npm ci
      - name: Test UI
        working-directory: mnemo-ui
        run: npm test
      - name: Build UI
        working-directory: mnemo-ui
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    needs: [core, ui]
    steps:
      - uses: actions/checkout@v4
      - name: Build core image
        run: docker build -t mnemo-core:ci mnemo-core
      - name: Build UI image
        run: docker build -t mnemo-ui:ci mnemo-ui
      - name: Validate Compose
        run: docker compose config
