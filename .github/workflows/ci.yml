name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mnemo-core/pyproject.toml
      - name: Install core
        working-directory: mnemo-core
        run: pip install -e ".[dev]"
      - name: Lint core
        working-directory: mnemo-core
        run: ruff check .
      - name: Test core
        working-directory: mnemo-core
        run: pytest -q
      - name: Build core distributions
        working-directory: mnemo-core
        run: |
          python -m pip install build
          python -m build
      - name: Smoke-test built core wheel
        working-directory: mnemo-core
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv /tmp/mnemo-core-wheel
          /tmp/mnemo-core-wheel/bin/python -m pip install dist/*.whl
          /tmp/mnemo-core-wheel/bin/mnemo-evaluate --version
          /tmp/mnemo-core-wheel/bin/python -c \
            "from importlib.metadata import version; from mnemo_core.api.app import app; assert app.version == version('mnemo-core')"

  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mnemo-ui/package-lock.json
      - name: Install UI
        working-directory: mnemo-ui
        run: npm ci
      - name: Test UI
        working-directory: mnemo-ui
        run: npm test
      - name: Build UI
        working-directory: mnemo-ui
        run: npm run build

  curator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mnemo-curator/pyproject.toml
      - name: Install curator
        working-directory: mnemo-curator
        run: pip install -e ".[dev]"
      - name: Lint curator
        working-directory: mnemo-curator
        run: ruff check .
      - name: Test curator
        working-directory: mnemo-curator
        run: pytest -q
      - name: Build curator distributions
        working-directory: mnemo-curator
        run: |
          python -m pip install build
          python -m build
      - name: Smoke-test built curator wheel
        working-directory: mnemo-curator
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv /tmp/mnemo-curator-wheel
          /tmp/mnemo-curator-wheel/bin/python -m pip install dist/*.whl
          /tmp/mnemo-curator-wheel/bin/mnemo-curator --help

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [core, ui, curator]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - name: Build core image
        run: docker build -t mnemo-core:ci mnemo-core
      - name: Build UI image
        run: docker build -t mnemo-ui:ci mnemo-ui
      - name: Build curator image
        run: docker build -t mnemo-curator:ci mnemo-curator
      - name: Build proxy image
        run: docker build -t mnemo-proxy:ci mnemo-proxy
      - name: Validate Compose
        run: docker compose --profile ui --profile curator --profile observability config
