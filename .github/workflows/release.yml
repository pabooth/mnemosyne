name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Verify version consistency
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          expected = os.environ["RELEASE_VERSION"]
          versions = {
              "VERSION": Path("VERSION").read_text().strip(),
              "mnemo-core/pyproject.toml": tomllib.loads(
                  Path("mnemo-core/pyproject.toml").read_text()
              )["project"]["version"],
              "mnemo-curator/pyproject.toml": tomllib.loads(
                  Path("mnemo-curator/pyproject.toml").read_text()
              )["project"]["version"],
              "mnemo-ui/package.json": json.loads(
                  Path("mnemo-ui/package.json").read_text()
              )["version"],
          }
          package_lock = json.loads(Path("mnemo-ui/package-lock.json").read_text())
          versions["mnemo-ui/package-lock.json"] = package_lock["version"]
          versions["mnemo-ui/package-lock.json root package"] = package_lock[
              "packages"
          ][""]["version"]

          mismatches = {
              source: actual
              for source, actual in versions.items()
              if actual != expected
          }
          if mismatches:
              for source, actual in mismatches.items():
                  print(f"{source}: expected {expected}, found {actual}")
              raise SystemExit(1)

          changelog_heading = f"## [{expected}]"
          if changelog_heading not in Path("CHANGELOG.md").read_text():
              raise SystemExit(f"CHANGELOG.md has no {changelog_heading} section")

          print(f"All release versions match {expected}")
          PY

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"

      - name: Build and test core
        working-directory: mnemo-core
        run: |
          pip install build ".[dev]"
          pytest -q
          python -m build

      - name: Smoke-test built core wheel
        working-directory: mnemo-core
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv /tmp/mnemo-core-release
          /tmp/mnemo-core-release/bin/python -m pip install dist/*.whl
          /tmp/mnemo-core-release/bin/mnemo-evaluate --version \
            | grep -Fx "mnemo-evaluate ${RELEASE_VERSION}"
          /tmp/mnemo-core-release/bin/python -c \
            "from importlib.metadata import version; from mnemo_core.api.app import app; assert app.version == version('mnemo-core')"

      - name: Build and test UI
        working-directory: mnemo-ui
        run: |
          npm ci
          npm test
          npm run build

      - name: Build and test curator
        working-directory: mnemo-curator
        run: |
          pip install build ".[dev]"
          pytest -q
          python -m build

      - name: Smoke-test built curator wheel
        working-directory: mnemo-curator
        run: |
          test -n "$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          python -m venv /tmp/mnemo-curator-release
          /tmp/mnemo-curator-release/bin/python -m pip install dist/*.whl
          /tmp/mnemo-curator-release/bin/mnemo-curator --help

      - name: Build release archives
        run: |
          mkdir -p release/mnemo-core release/mnemo-ui release/mnemo-curator release/mnemosyne
          cp -R mnemo-core/mnemo_core mnemo-core/pyproject.toml mnemo-core/Dockerfile mnemo-core/README.md mnemo-core/LICENSE release/mnemo-core/
          cp -R mnemo-curator/mnemo_curator mnemo-curator/pyproject.toml mnemo-curator/Dockerfile mnemo-curator/README.md mnemo-curator/LICENSE release/mnemo-curator/
          cp -R mnemo-ui/dist mnemo-ui/nginx.conf mnemo-ui/Dockerfile LICENSE release/mnemo-ui/
          git archive HEAD \
            mnemo-core \
            mnemo-curator \
            mnemo-ui \
            deploy \
            docs \
            docker-compose.yml \
            .env.example \
            README.md \
            LICENSE \
            VERSION \
            | tar -x -C release/mnemosyne
          cp -R mnemo-ui/dist release/mnemosyne/mnemo-ui/
          tar -C release -czf "mnemo-core-${{ steps.version.outputs.VERSION }}.tgz" mnemo-core
          tar -C release -czf "mnemo-curator-${{ steps.version.outputs.VERSION }}.tgz" mnemo-curator
          tar -C release -czf "mnemo-ui-${{ steps.version.outputs.VERSION }}.tgz" mnemo-ui
          tar -C release -czf "mnemosyne-${{ steps.version.outputs.VERSION }}.tgz" mnemosyne

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push core image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: mnemo-core
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mnemo-core:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/mnemo-core:latest

      - name: Build and push UI image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: mnemo-ui
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mnemo-ui:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/mnemo-ui:latest

      - name: Build and push curator image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: mnemo-curator
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mnemo-curator:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/mnemo-curator:latest

      - name: Build Linux packages
        run: |
          docker run --rm \
            -e VERSION="${{ steps.version.outputs.VERSION }}" \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/goreleaser/nfpm:v2.43.0 \
            package --config deploy/packages/nfpm.yaml --packager deb --target "mnemosyne_${{ steps.version.outputs.VERSION }}_amd64.deb"
          docker run --rm \
            -e VERSION="${{ steps.version.outputs.VERSION }}" \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/goreleaser/nfpm:v2.43.0 \
            package --config deploy/packages/nfpm.yaml --packager rpm --target "mnemosyne-${{ steps.version.outputs.VERSION }}.x86_64.rpm"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.NOTES }}
          files: |
            mnemo-core-${{ steps.version.outputs.VERSION }}.tgz
            mnemo-curator-${{ steps.version.outputs.VERSION }}.tgz
            mnemo-ui-${{ steps.version.outputs.VERSION }}.tgz
            mnemosyne-${{ steps.version.outputs.VERSION }}.tgz
            mnemo-core/dist/*
            mnemo-curator/dist/*
            mnemosyne_${{ steps.version.outputs.VERSION }}_amd64.deb
            mnemosyne-${{ steps.version.outputs.VERSION }}.x86_64.rpm
          draft: false
          prerelease: false
