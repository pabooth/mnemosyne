name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, GitHub tokens, webhook secrets, private documents, or generated confidential content.
  - type: input
    id: version
    attributes:
      label: Mnemosyne version
      placeholder: Release tag or container image tag
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - mnemo-core
        - mnemo-ui
        - Docker or deployment
        - MCP integration
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Docker version, browser, or MCP client as relevant.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or additional context
      description: Remove credentials, authorization headers, private source material, and generated confidential content.
