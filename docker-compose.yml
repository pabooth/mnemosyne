services:
  core:
    build:
      context: ./mnemo-core
    user: "${MNEMO_UID:-0}:${MNEMO_GID:-0}"
    environment:
      MAIN_LLM_PROVIDER: ${MAIN_LLM_PROVIDER:-anthropic}
      MAIN_LLM_MODEL: ${MAIN_LLM_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_BASE_URL: ${XAI_BASE_URL:-https://api.x.ai/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ADVERSARIAL_REVIEW_ENABLED: ${ADVERSARIAL_REVIEW_ENABLED:-false}
      REVIEWER_CRITIC_PROVIDER: ${REVIEWER_CRITIC_PROVIDER:-openai}
      REVIEWER_CRITIC_MODEL: ${REVIEWER_CRITIC_MODEL:-gpt-4o}
      REVIEWER_JUDGE_PROVIDER: ${REVIEWER_JUDGE_PROVIDER:-gemini}
      REVIEWER_JUDGE_MODEL: ${REVIEWER_JUDGE_MODEL:-gemini-2.5-pro}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      DOCS_ROOT: ${DOCS_ROOT:-}
      MNEMO_API_TOKEN: ${MNEMO_API_TOKEN:-}
      MNEMO_API_TOKENS: ${MNEMO_API_TOKENS:-}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8888}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      STATE_DB_PATH: /data/state.db
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-120}
      REQUEST_RATE_LIMIT_PER_MINUTE: ${REQUEST_RATE_LIMIT_PER_MINUTE:-30}
      REQUEST_MAX_CONCURRENCY: ${REQUEST_MAX_CONCURRENCY:-4}
      REQUEST_MAX_BODY_BYTES: ${REQUEST_MAX_BODY_BYTES:-2000000}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-2}
      JOB_RETRY_BASE_SECONDS: ${JOB_RETRY_BASE_SECONDS:-1}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_BRANCH: ${GITHUB_WEBHOOK_BRANCH:-main}
      GITHUB_WEBHOOK_PATH_PREFIX: ${GITHUB_WEBHOOK_PATH_PREFIX:-}
      GITHUB_WEBHOOK_MAX_FILES: ${GITHUB_WEBHOOK_MAX_FILES:-20}
      SOURCE_URL_ALLOWED_HOSTS: ${SOURCE_URL_ALLOWED_HOSTS:-}
      VECTOR_STORE: ${VECTOR_STORE:-sqlite-vec}
      VECTOR_DB_PATH: /data/vectors.db
      VECTOR_EMBEDDING_DIM: ${VECTOR_EMBEDDING_DIM:-1536}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_OPENAI_MODEL: ${EMBEDDING_OPENAI_MODEL:-text-embedding-3-small}
      EMBEDDING_OLLAMA_MODEL: ${EMBEDDING_OLLAMA_MODEL:-nomic-embed-text}
      INDEX_MAX_FILES: ${INDEX_MAX_FILES:-2000}
      DEDUP_ENABLED: ${DEDUP_ENABLED:-false}
      DEDUP_MAX_DISTANCE: ${DEDUP_MAX_DISTANCE:-0.35}
      DEDUP_TOP_K: ${DEDUP_TOP_K:-3}
    ports:
      - "${MNEMO_CORE_BIND_ADDRESS:-127.0.0.1}:${MNEMO_PORT_CORE:-7777}:7777"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7777/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ${MNEMO_HOME:?Set MNEMO_HOME to your Mnemosyne instance directory (see docs/deployment/docker-compose.md)}/data/mnemo-core:/data

  ui:
    build:
      context: ./mnemo-ui
    profiles: ["ui"]
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped

  curator:
    build:
      context: ./mnemo-curator
    user: "${MNEMO_UID:-0}:${MNEMO_GID:-0}"
    profiles: ["curator"]
    depends_on:
      core:
        condition: service_healthy
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      DOCS_ROOT: ${DOCS_ROOT:-}
      MNEMO_CORE_URL: http://core:7777
      MNEMO_API_TOKEN: ${MNEMO_API_TOKEN:-}
      CURATOR_STALE_AFTER_DAYS: ${CURATOR_STALE_AFTER_DAYS:-180}
      CURATOR_MAX_FILES: ${CURATOR_MAX_FILES:-500}
      CURATOR_DEFAULT_OWNER: ${CURATOR_DEFAULT_OWNER:-unset}
      CURATOR_ISSUE_TRACKER: ${CURATOR_ISSUE_TRACKER:-github}
      CURATOR_ISSUE_LABELS: ${CURATOR_ISSUE_LABELS:-mnemo-curator}
      CURATOR_ISSUE_DB_PATH: /data/issues.db
      CURATOR_SEMANTIC_RESOLUTION_ENABLED: ${CURATOR_SEMANTIC_RESOLUTION_ENABLED:-false}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Task}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${CURATOR_OPENAI_MODEL:-gpt-4o-mini}
    command: ["mnemo-curator", "scan"]
    volumes:
      - ${MNEMO_HOME:?Set MNEMO_HOME to your Mnemosyne instance directory (see docs/deployment/docker-compose.md)}/data/mnemo-curator:/data

  proxy:
    build:
      context: ./mnemo-proxy
    profiles: ["ui"]
    depends_on:
      - ui
      - core
    ports:
      - "${MNEMO_UI_BIND_ADDRESS:-0.0.0.0}:${MNEMO_PORT_UI:-8888}:8080"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: ["observability"]
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${MNEMO_OBSERVABILITY_BIND_ADDRESS:-127.0.0.1}:9090:9090"

  grafana:
    image: grafana/grafana:12.0.1
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-replace-with-a-long-random-value}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "${MNEMO_OBSERVABILITY_BIND_ADDRESS:-127.0.0.1}:3000:3000"
