name: mnemosyne
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Mnemosyne contributors
description: AI-assisted, human-governed knowledge ingestion deployment
license: MIT
contents:
  - src: deploy/packages/mnemosyne
    dst: /usr/bin/mnemosyne
    file_info:
      mode: 0755
  - src: deploy/packages/docker-compose.yml
    dst: /usr/share/mnemosyne/docker-compose.yml
  - src: VERSION
    dst: /usr/share/mnemosyne/VERSION
  - src: deploy/reverse-proxy/nginx.conf
    dst: /usr/share/mnemosyne/deploy/reverse-proxy/nginx.conf
  - src: deploy/observability/otel-collector.yaml
    dst: /usr/share/mnemosyne/deploy/observability/otel-collector.yaml
  - src: deploy/observability/prometheus.yml
    dst: /usr/share/mnemosyne/deploy/observability/prometheus.yml
  - src: deploy/observability/grafana-datasources.yml
    dst: /usr/share/mnemosyne/deploy/observability/grafana-datasources.yml
  - src: .env.example
    dst: /etc/mnemosyne/mnemosyne.env
    type: config|noreplace
  - src: LICENSE
    dst: /usr/share/doc/mnemosyne/LICENSE
