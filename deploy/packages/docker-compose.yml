services:
  core:
    image: ghcr.io/pabooth/mnemo-core:${MNEMO_VERSION:-latest}
    user: "${MNEMO_UID:-0}:${MNEMO_GID:-0}"
    env_file:
      - /etc/mnemosyne/mnemosyne.env
    environment:
      STATE_DB_PATH: /data/mnemosyne.db
    volumes:
      - mnemo-data:/data
    restart: unless-stopped

  ui:
    image: ghcr.io/pabooth/mnemo-ui:${MNEMO_VERSION:-latest}
    depends_on:
      - core
    restart: unless-stopped

  curator:
    image: ghcr.io/pabooth/mnemo-curator:${MNEMO_VERSION:-latest}
    profiles: ["curator"]
    env_file:
      - /etc/mnemosyne/mnemosyne.env
    environment:
      MNEMO_CORE_URL: http://core:7777
      CURATOR_ISSUE_DB_PATH: /data/mnemo-curator-issues.db
    volumes:
      - mnemo-curator-data:/data
    depends_on:
      - core
    command: ["mnemo-curator", "scan"]

  proxy:
    image: nginxinc/nginx-unprivileged:stable-alpine
    depends_on:
      - core
      - ui
    ports:
      - "${MNEMO_UI_BIND_ADDRESS:-0.0.0.0}:${MNEMO_PORT_UI:-8888}:8080"
    volumes:
      - /usr/share/mnemosyne/deploy/reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  mnemo-data:
  mnemo-curator-data:
